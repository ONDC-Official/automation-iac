{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name | default "automation-ingress" }}
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "automation-ingress-layer.labels" . | nindent 4 }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{- if $value }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
  {{- range .Values.ingress.tls }}
  - hosts:
    {{- range .hosts }}
    - {{ . | quote }}
    {{- end }}
    {{- if .secretName }}
    secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  {{- end }}
  rules:
  {{- range .Values.ingress.hosts }}
  - host: {{ .host | quote }}
    http:
      paths:
      {{- range .paths }}
      - path: {{ .path }}
        pathType: {{ .pathType }}
        backend:
          service:
            name: {{ .service }}
            port:
              number: {{ .port }}
      {{- end }}
      {{- if $.Values.domainRouting.enabled }}
      - path: {{ $.Values.domainRouting.api.path }}
        pathType: {{ $.Values.domainRouting.api.pathType }}
        backend:
          service:
            name: {{ $.Values.domainRouting.api.service }}
            port:
              number: {{ $.Values.domainRouting.api.port }}
      - path: {{ $.Values.domainRouting.mock.path }}
        pathType: {{ $.Values.domainRouting.mock.pathType }}
        backend:
          service:
            name: {{ $.Values.domainRouting.mock.service }}
            port:
              number: {{ $.Values.domainRouting.mock.port }}
      {{- end }}
  {{- end }}
{{- end }}
