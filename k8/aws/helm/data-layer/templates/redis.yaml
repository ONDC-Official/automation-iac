{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: {{ .Values.redis.name }}
    {{- include "automation-data-layer.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ .Values.redis.name }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: redis
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-headless" .Values.redis.name }}
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: {{ .Values.redis.name }}
    {{- include "automation-data-layer.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: {{ .Values.redis.name }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: {{ .Values.redis.name }}
    {{- include "automation-data-layer.labels" . | nindent 4 }}
spec:
  serviceName: {{ printf "%s-headless" .Values.redis.name }}
  replicas: {{ .Values.redis.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.redis.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.redis.name }}
        component: data
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          {{- with .Values.redis.extraArgs }}
          args:
{{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.service.port }}
          resources:
{{ toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      {{- if not .Values.redis.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
{{ toYaml .Values.redis.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
        {{- if .Values.redis.persistence.storageClassName }}
        storageClassName: {{ .Values.redis.persistence.storageClassName | quote }}
        {{- end }}
  {{- end }}
{{- end }}
