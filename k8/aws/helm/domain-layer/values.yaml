global:
  namespace: automation-dev
  createNamespace: false
  environment: dev
  replicas: 1
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 700Mi

commonEnv:
  api: {}
  mock: {}
# Example:
# commonEnv:
#   api:
#     NODE_ENV: production
#     SUBSCRIBER_ID: dev-automation.ondc.org
#     REDIS_HOST: redis
#     REDIS_PORT: "6379"
#     WORKBENCH_SUBSCRIBER_ID: mock.workbench.ondc
#     IN_HOUSE_REGISTRY: https://dev-automation.ondc.org/registry/v2.0/
#     MOCK_SERVER_URL: https://dev-automation.ondc.org/mock
#     DATA_BASE_URL: https://dev-automation.ondc.org/db-service
#     API_SERVICE_URL: https://dev-automation.ondc.org/api-service
#     CONFIG_SERVICE_URL: https://dev-automation.ondc.org/config-service
#     TRACE_URL: http://otel-collector.gcr-dev.svc.cluster.local:4318/v1/traces
#     HOSTED_ENV: DEV
#   mock:
#     NODE_ENV: production
#     SUBSCRIBER_ID: mock.workbench.ondc
#     REDIS_HOST: redis
#     REDIS_PORT: "6379"
#     TRACE_URL: http://otel-collector.gcr-dev.svc.cluster.local:4318/v1/traces

apiRouter:
  enabled: true
  image:
    repository: nginx
    tag: "1.27-alpine"
  service:
    type: ClusterIP
    port: 8080
  replicas: 1
  resources: {}

mockRouter:
  enabled: true
  image:
    repository: nginx
    tag: "1.27-alpine"
  service:
    type: ClusterIP
    port: 8080
  replicas: 1
  resources: {}
  # Shared playground upstream reused by any domain with mock.mode=playground.
  defaultPlaygroundUrl: "http://playground-mock-service:3000/mock/playground/"

