apiRouter:
  enabled: true
  image:
    repository: nginx
    tag: "1.27-alpine"
  service:
    type: ClusterIP
    port: 8080
  replicas: 1
  resources: {}

mockRouter:
  enabled: true
  image:
    repository: nginx
    tag: "1.27-alpine"
  service:
    type: ClusterIP
    port: 8080
  replicas: 1
  resources: {}
  # Shared playground upstream reused by any domain with mock.mode=playground.
  defaultPlaygroundUrl: "http://playground-mock-service:3000/mock/playground/"

domains:
  - domain: "ONDC:FIS12"
    version: "2.3.0"
    enabled: true
    api:
      enabled: true
      image:
        repository: ghcr.io/ondc-official/ondc-onix-dev-ondcfis12-2.3.0
        tag: k8
      service:
        type: ClusterIP
        port: 7039
      env:
        SERVICE_NAME: "automation-api-service-dev-ondcfis12-2.3.0"
    mock:
      enabled: true
      mode: playground
  - domain: "ONDC:RET11"
    version: "1.2.0"
    enabled: true
    api:
      enabled: true
      image:
        repository: ghcr.io/ondc-official/ondc-onix-dev-api-service-ret11-1.2.0
        tag: k8-1.8
      service:
        type: ClusterIP
        port: 7039
      env:
        SERVICE_NAME: "automation-api-service-dev-ondcret11-1.2.0"
    mock:
      enabled: true
      mode: playground
